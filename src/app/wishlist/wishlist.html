@if(isAddingWish){
    <app-new-wish [userId]="userId" (close)="onCloseAddWish()" />
}

<section id="wishlist">
    <header>
        <h2>{{name}}'s Wishlist</h2>
        <menu>
            <button (click)="onStartAddWish()">Add Wish</button>
        </menu>
    </header>

    <ul>
        @for(wish of selectedUserWishes; track wish.id){
            <li>
                <app-wish [wish]="wish" />
            </li>
        }
    </ul>
</section>
