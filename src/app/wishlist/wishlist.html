@if(isAddingWish){
    <app-new-wish (cancel)="onCancelAddWish()" (add)="onAddWish($event)" />
}

<section id="wishlist">
    <header>
        <h2>{{name}}'s Wishlist</h2>
        <menu>
            <button (click)="onStartAddWish()">Add Wish</button>
        </menu>
    </header>

    <ul>
        @for(wish of selectedUserWishes; track wish.id){
            <li>
                <app-wish [wish]="wish" (complete)="onCompleteWish($event)"/>
            </li>
        }
    </ul>
</section>
